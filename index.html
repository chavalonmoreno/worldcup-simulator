<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulador Mundial 2026</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Simulador del Mundial 2026</h1>
    <p>Los partidos marcados en verde son resultados reales oficiales. Completa el resto para ver las llaves.</p>
  </header>

  <main id="app">
    <section id="groups-container">
      <h2>Fase de Grupos</h2>
      <div class="groups-grid" id="groups-grid">
        </div>
    </section>

    <section id="bracket-container">
      <h2>Ronda de 32 (Dieciseisavos de Final)</h2>
      <div class="bracket-grid" id="round-of-32">
        </div>
    </section>
  </main>

  <script src="simulator.js"></script>
  <script src="app.js"></script>
</body>
</html>
