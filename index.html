<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Mundial 2026</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons@7.2.3/css/flag-icons.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="header">
    <h1>Simulador Mundial <span class="year">2026</span></h1>
    <p>Completa los marcadores — el bracket se actualiza automáticamente</p>
</header>

<div class="actions">
    <button id="simulateBtn">Calcular Standings</button>
    <button id="resetBtn">Reiniciar</button>
</div>

<main>

    <!-- ===================== -->
    <!-- FASE DE GRUPOS -->
    <!-- ===================== -->

    <section id="groups-section">

        <h2>Fase de Grupos</h2>

        <div id="groups-container">
            <!-- generado por JS -->
        </div>

    </section>

    <!-- ===================== -->
    <!-- ELIMINACIÓN -->
    <!-- ===================== -->

    <section id="knockout-section">

        <h2>Eliminación Directa</h2>

        <div class="round">
            <h3>16avos de Final</h3>
            <div id="round32"></div>
        </div>

        <div class="round">
            <h3>Octavos de Final</h3>
            <div id="round16"></div>
        </div>

        <div class="round">
            <h3>Cuartos de Final</h3>
            <div id="quarterfinals"></div>
        </div>

        <div class="round">
            <h3>Semifinales</h3>
            <div id="semifinals"></div>
        </div>

        <div class="round">
            <h3>Tercer Lugar</h3>
            <div id="thirdPlace"></div>
        </div>

        <div class="round">
            <h3>Final</h3>
            <div id="final"></div>
        </div>

    </section>

</main>

<!-- ================================================= -->
<!-- TEMPLATE GRUPO -->
<!-- ================================================= -->

<template id="groupTemplate">

    <div class="group-card">

        <h3 class="group-name"></h3>

        <table class="standings-table">

            <thead>
            <tr>
                <th>#</th>
                <th>Equipo</th>
                <th>Pts</th>
                <th>DG</th>
                <th>GF</th>
                <th>GC</th>
            </tr>
            </thead>

            <tbody class="group-table-body">
            </tbody>

        </table>

        <div class="matches-container">
        </div>

    </div>

</template>

<!-- ================================================= -->
<!-- TEMPLATE PARTIDO -->
<!-- ================================================= -->

<template id="matchTemplate">

    <div class="match-card">

        <div class="match-id"></div>

        <div class="team-row">

            <span class="team-name home-name">Local</span>

            <input
                class="score-input home-score"
                type="number"
                min="0"
                max="30"
                step="1">

        </div>

        <div class="team-row">

            <span class="team-name away-name">Visitante</span>

            <input
                class="score-input away-score"
                type="number"
                min="0"
                max="30"
                step="1">

        </div>

    </div>

</template>

<!-- ================================================= -->
<!-- TEMPLATE PARTIDO ELIMINACIÓN -->
<!-- ================================================= -->

<template id="knockoutMatchTemplate">

    <div class="knockout-match">
        <div class="team knockout-home">TBD</div>
        <div class="team knockout-away">TBD</div>
    </div>

</template>

<script type="module" src="app.js"></script>

</body>
</html>
